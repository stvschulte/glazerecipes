<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="GlazeRecipes helps potters build compact €29 glaze recipe sets with 50ml studio-ready pots."
    />
    <title>GlazeRecipes | Sunlit Recipe Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap"

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='10' fill='%23FDFBF7'/%3E%3Ccircle cx='16' cy='16' r='10' fill='%23D96C4A'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23F4E9D8'/%3E%3C/svg%3E"
    />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              linen: "#FDFBF7",
              paper: "#FAFAF8",
              canvas: "#F4E9D8",
              espresso: "#2D2825",
              clay: "#D96C4A",
              sage: "#8A9A86",
              ochre: "#B88746",
              umber: "#7A5742",
            },
            fontFamily: {
              serif: ["Newsreader", "Georgia", "serif"],
              sans: ["DM Sans", "ui-sans-serif", "system-ui", "sans-serif"],

          },

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/framer-motion@11.18.2/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        overflow-x: hidden;
        overscroll-behavior-x: none;
        background: #fdfbf7;
        color: #2d2825;
        font-family: "DM Sans", ui-sans-serif, system-ui, sans-serif;
      }

      #root {
        overflow-x: hidden;
      }

      * {
        box-sizing: border-box;
      }

      .paper-grain::before {
        position: fixed;
        inset: 0;
        z-index: 80;
        pointer-events: none;
        content: "";
        opacity: 0.075;
        mix-blend-mode: multiply;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='240' height='240' filter='url(%23n)' opacity='.42'/%3E%3C/svg%3E");
        background-size: 210px 210px;
      }

      .sunlit-bg {
        background:
          radial-gradient(circle at 14% 8%, rgba(217, 108, 74, 0.13), transparent 26%),
          radial-gradient(circle at 86% 16%, rgba(184, 135, 70, 0.14), transparent 30%),
          radial-gradient(circle at 58% 90%, rgba(138, 154, 134, 0.13), transparent 34%),
          linear-gradient(180deg, #fdfbf7 0%, #faf7ef 46%, #f6ecdc 100%);
      }

      .workbench-section {
        background-image: url("/dark-workbench.jpg");
        background-position: center;
        background-size: cover;
      }

      .studio-section {
        background-image: url("/studio.jpg");
        background-position: center;
        background-size: cover;
      }

      .custom-box-shadow {
        box-shadow:
          0 30px 84px rgba(116, 77, 48, 0.15),
          inset 0 1px 0 rgba(255, 252, 245, 0.9);
      }

      .paper-panel {
        background:
          linear-gradient(135deg, rgba(253, 251, 247, 0.94), rgba(244, 233, 216, 0.78)),
          radial-gradient(circle at 24% 14%, rgba(255, 255, 255, 0.42), transparent 28%);
      }

      .warm-shadow {
        box-shadow:
          0 26px 80px rgba(116, 77, 48, 0.16),
          0 8px 24px rgba(116, 77, 48, 0.08),
          inset 0 1px 0 rgba(255, 252, 245, 0.9);
      }

      .card-shadow {
        box-shadow:
          0 30px 86px rgba(96, 63, 41, 0.22),
          0 10px 26px rgba(96, 63, 41, 0.12),
          0 0 0 1px rgba(126, 91, 67, 0.12);
      }

      .photo-vignette::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(0deg, rgba(45, 40, 37, 0.78), transparent 48%),
          radial-gradient(circle at 50% 22%, transparent 28%, rgba(45, 40, 37, 0.22) 88%);
      }

      .soft-input {
        box-shadow:
          inset 0 1px 0 rgba(255, 252, 245, 0.9),
          0 14px 30px rgba(116, 77, 48, 0.08);
      }
    </style>
  </head>
  <body class="paper-grain">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useRef, useState } = React;
      const {
        AnimatePresence,
        motion,
        useMotionValue,
        useTransform,
      } = Motion;

      const heroSlides = [
        {
          id: "jars",
          src: "/jars.jpg",
          alt: "Three GlazeRecipes 50ml glaze pots with recipe card",
        },
        {
          id: "packaging",
          src: "/verpakking.jpg",
          alt: "GlazeRecipes secure premium packaging box on a studio workbench",
        },
      ];

      const glazeOptions = [
        { id: "deep-teal", name: "Deep Teal", color: "#154E58", finish: "Gloss" },
        { id: "storm-grey", name: "Storm Grey", color: "#65727A", finish: "Satin" },
        { id: "warm-cream", name: "Warm Cream", color: "#D9CCB2", finish: "Matte" },
        { id: "raw-sienna", name: "Raw Sienna", color: "#7A4B2F", finish: "Iron" },
        { id: "oatmeal", name: "Oatmeal", color: "#E7DDC2", finish: "Speckle" },
        { id: "deep-olive", name: "Deep Olive", color: "#8D8E45", finish: "Runny" },
        { id: "honey-flux", name: "Honey Flux", color: "#E5D8AA", finish: "Flow" },
        { id: "ancient-jasper", name: "Ancient Jasper", color: "#8C4B2E", finish: "Break" },
      ];

      function useInterval(callback, delay) {
        const savedCallback = useRef(callback);

        useEffect(() => {
          savedCallback.current = callback;
        }, [callback]);

        useEffect(() => {
          if (delay === null) return undefined;
          const id = window.setInterval(() => savedCallback.current(), delay);
          return () => window.clearInterval(id);
        }, [delay]);
      }

      const recipes = [
        {
          id: "midnight-ocean",
          look: "Midnight Ocean",
          title: "The Midnight Ocean Bowl",
          image: "assets/midnight-ocean.png",
          mood: "Deep blue melt, iron-dark edges, and a soft blush inside the lip.",
          clay: "Speckled stoneware, medium fire",
          palette: [
            { name: "Deep Teal", color: "#154E58", role: "Base" },
            { name: "Stormy Grey", color: "#65727A", role: "Top" },
            { name: "Warm Cream", color: "#D9CCB2", role: "Accent" },
          ],
          layers: [
            ["Base", "2 coats Deep Teal over the full piece. Let dry completely."],
            ["Top", "1 coat Stormy Grey around the rim and upper third."],
            ["Accent", "A light splash of Warm Cream inside the bowl."],
            ["Firing", "Cone 6, hold for 15 mins."],
          ],
        },
        {
          id: "forest-lichen",
          look: "Forest Lichen",
          title: "The Forest Lichen Tumbler",
          image: "assets/forest-ash.png",
          mood: "Mossy olive breaks into blue rivulets over a smoky clay body.",
          clay: "Recycled studio clay, cone 6",
          palette: [
            { name: "Stormy Night", color: "#4B5B68", role: "Base" },
            { name: "Deep Olive", color: "#8D8E45", role: "Body" },
            { name: "Honey Flux", color: "#E5D8AA", role: "Rim" },
          ],
          layers: [
            ["Base", "1 thin dip of Stormy Night across the whole form."],
            ["Body", "2 coats Deep Olive over the top two thirds."],
            ["Rim", "Brush Honey Flux around the lip and high points."],
            ["Firing", "Cone 6, natural cool."],
          ],
        },
        {
          id: "honey-iron",
          look: "Honey Iron",
          title: "The Honey Iron Cup",
          image: "assets/honey-iron.png",
          mood: "Bone glaze, honey crystals, and warm iron pooling around the lip.",
          clay: "White mid-fire clay, carved lower band",
          palette: [
            { name: "Raw Sienna", color: "#7A4B2F", role: "Lower" },
            { name: "Oatmeal", color: "#E7DDC2", role: "Upper" },
            { name: "Ancient Jasper", color: "#8C4B2E", role: "Rim" },
          ],
          layers: [
            ["Lower", "2 coats Raw Sienna on the lower half."],
            ["Upper", "3 generous coats Oatmeal on the upper half."],
            ["Rim", "1 careful coat Ancient Jasper on the rim and interior."],
            ["Firing", "Cone 6, hold for 15 mins."],
          ],
        },
      ];

      function IconX(props) {
        return (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        );
      }

      function IconHeart(props) {
        return (
          <svg viewBox="0 0 24 24" fill="currentColor" {...props}>
            <path d="M12 21s-7.1-4.32-9.6-8.38C.28 9.18 1.82 5 5.73 5c2.13 0 3.5 1.19 4.27 2.26C10.77 6.19 12.14 5 14.27 5c3.91 0 5.45 4.18 3.33 7.62C19.1 16.68 12 21 12 21Z" />
          </svg>
        );
      }

      function IconArrow(props) {
        return (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...props}>
            <path d="M5 12h14" />
            <path d="m13 6 6 6-6 6" />
          </svg>
        );
      }

      function IconSpark(props) {
        return (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" {...props}>
            <path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3Z" />
            <path d="M19 16l.8 2.2L22 19l-2.2.8L19 22l-.8-2.2L16 19l2.2-.8L19 16Z" />
          </svg>
        );
      }

      function PotTag({ pot }) {
        return (
          <div className="flex items-center gap-3 rounded-2xl border border-[#E5D6BE] bg-[#FDFBF7]/76 p-3">
            <span
              className="h-11 w-11 rounded-full border border-[#A77B5D]/20 shadow-[inset_0_8px_14px_rgba(255,252,245,.5),inset_0_-8px_16px_rgba(70,45,30,.18)]"
              style={{ background: pot.color }}
            />
            <span>
              <span className="block text-[11px] font-bold uppercase tracking-[0.18em] text-[#8A9A86]">{pot.role}</span>
              <strong className="block text-sm text-[#2D2825]">{pot.name}</strong>
            </span>
          </div>
        );
      }

      function HeroSlideshow() {
        const [index, setIndex] = useState(0);
        const slide = heroSlides[index];

        useInterval(() => {
          setIndex((current) => (current + 1) % heroSlides.length);
        }, 8000);

        return (
          <div className="absolute inset-0">
            <AnimatePresence mode="wait">
              <motion.img
                key={slide.id}
                src={slide.src}
                alt=""
                aria-hidden="true"
                className="absolute inset-0 h-full w-full object-cover"
                initial={{ opacity: 0, scale: 1.035 }}
                animate={{ opacity: 1, scale: 1 }}
                exit={{ opacity: 0, scale: 1.01 }}
                transition={{ duration: 1.4, ease: [0.22, 1, 0.36, 1] }}
              />
            </AnimatePresence>
            <div className="absolute inset-0 bg-[linear-gradient(90deg,rgba(253,251,247,.86),rgba(253,251,247,.66)_45%,rgba(253,251,247,.4)),linear-gradient(180deg,rgba(255,248,235,.42),rgba(244,233,216,.52))]" />
            <div className="absolute bottom-7 right-7 z-10 flex gap-2">
              {heroSlides.map((item, dotIndex) => (
                <span
                  key={item.id}
                  className={`h-2 rounded-full transition-all ${dotIndex === index ? "w-8 bg-[#D96C4A]" : "w-2 bg-[#2D2825]/30"}`}
                />
              ))}
            </div>
          </div>
        );
      }

      function RecipeCard({ recipe, index, active, onSwipe, exitDirection }) {
        const x = useMotionValue(0);
        const rotate = useTransform(x, [-240, 240], [-11, 11]);
        const opacity = useTransform(x, [-260, -120, 0, 120, 260], [0.88, 0.96, 1, 0.96, 0.88]);
        const yesOpacity = useTransform(x, [34, 150], [0, 1]);
        const noOpacity = useTransform(x, [-150, -34], [1, 0]);
        const tint = useTransform(
          x,
          [-220, 0, 220],
          ["rgba(201,82,66,.34)", "rgba(0,0,0,0)", "rgba(138,154,134,.32)"]
        );

        return (
          <motion.article
            layoutId={`recipe-card-${recipe.id}`}
            className="absolute inset-0 cursor-grab overflow-hidden rounded-[1.5rem] border border-[#E3D1B8] bg-[#F4E9D8] card-shadow active:cursor-grabbing"
            custom={exitDirection}
            drag={active ? "x" : false}
            dragDirectionLock
            dragConstraints={{ left: 0, right: 0 }}
            dragElastic={0.82}
            variants={{
              exit: (direction) => ({
                x: direction === "left" ? -1000 : 1000,
                rotate: direction === "left" ? -18 : 18,
                opacity: 0,
                transition: { duration: 0.28 },
              }),
            }}
            style={{
              touchAction: active ? "pan-y" : "auto",
              x,
              rotate: active ? rotate : index % 2 ? -1.8 : 1.8,
              opacity,
              zIndex: 20 - index,
              scale: active ? 1 : 1 - index * 0.045,
              y: index * 15,
            }}
            onDragEnd={(_, info) => {
              const offset = info.offset.x;
              const velocity = info.velocity.x;

              if (offset > 120 || (offset > 42 && velocity > 720)) {
                onSwipe("right");
              } else if (offset < -120 || (offset < -42 && velocity < -720)) {
                onSwipe("left");
              }
            }}
            initial={{ scale: 0.96, y: 24, opacity: 0 }}
            animate={{ scale: active ? 1 : 1 - index * 0.045, y: index * 15, opacity: 1 }}
            exit="exit"
            transition={{ type: "spring", stiffness: 245, damping: 28 }}
          >
            <div className="photo-vignette absolute inset-0">
              <motion.img
                layoutId={`recipe-image-${recipe.id}`}
                src={recipe.image}
                alt={recipe.title}
                className="h-full w-full object-cover"
                draggable="false"
              />
            </div>
            {active && (
              <>
                <motion.div className="absolute inset-0" style={{ backgroundColor: tint }} />
                <motion.div
                  className="absolute left-5 top-5 rounded-full border border-[#D96C4A]/28 bg-[#FDFBF7]/86 px-5 py-2 text-sm font-bold uppercase tracking-[0.22em] text-[#A94B35] backdrop-blur"
                  style={{ opacity: noOpacity }}
                >
                  Skip
                </motion.div>
                <motion.div
                  className="absolute right-5 top-5 rounded-full border border-[#8A9A86]/32 bg-[#FDFBF7]/86 px-5 py-2 text-sm font-bold uppercase tracking-[0.22em] text-[#667760] backdrop-blur"
                  style={{ opacity: yesOpacity }}
                >
                  Save
                </motion.div>

                <div className="absolute inset-x-0 bottom-0 p-6 pt-28">
                  <p className="mb-2 text-xs font-bold uppercase tracking-[0.22em] text-[#F0D3BE]">
                    Swipe right for recipe
                  </p>
                  <h3 className="font-serif text-4xl leading-none text-[#FFF8EB]">{recipe.look}</h3>
                  <p className="mt-3 max-w-sm text-sm leading-6 text-[#F8EAD6] opacity-90">{recipe.mood}</p>
                  <div className="mt-5 grid gap-2 sm:grid-cols-3">
                    {recipe.palette.map((pot) => (
                      <div key={pot.name} className="rounded-xl border border-[#FDFBF7]/24 bg-[#2D2825]/38 px-3 py-2 backdrop-blur">
                        <span className="mb-1 block h-3 rounded-full" style={{ background: pot.color }} />
                        <span className="text-xs text-[#FFF8EB]">{pot.name}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </>
            )}
          </motion.article>
        );
      }

      function ExpandedRecipe({ recipe, onClose, onAdd }) {
        const [adding, setAdding] = useState(false);

        useEffect(() => {
          const previous = document.body.style.overflow;
          document.body.style.overflow = "hidden";
          return () => {
            document.body.style.overflow = previous;
          };
        }, []);

        function handleAdd() {
          if (adding) return;
          setAdding(true);
          window.setTimeout(() => onAdd(recipe), 280);
        }

        return (
          <motion.div
            className="fixed inset-0 z-[70] grid place-items-center overflow-y-auto bg-[#2D2825]/18 px-4 py-5 backdrop-blur-xl md:px-8 md:py-10"
            initial={{ opacity: 0 }}
            animate={{ opacity: 1 }}
            exit={{ opacity: 0 }}
          >
            <motion.article
              layoutId={`recipe-card-${recipe.id}`}
              className="relative mx-auto max-h-[calc(100svh-2rem)] w-full max-w-5xl overflow-y-auto rounded-[2rem] border border-[#E3D1B8] bg-[#FDFBF7] warm-shadow"
              animate={adding ? { x: 1000, opacity: 0, rotate: 7 } : { x: 0, opacity: 1, rotate: 0 }}
              transition={{ duration: adding ? 0.28 : 0.2, ease: [0.22, 1, 0.36, 1] }}
            >
              <button
                type="button"
                onClick={onClose}
                className="absolute right-3 top-3 z-30 grid h-11 w-11 place-items-center rounded-full border border-[#E3D1B8] bg-[#FDFBF7]/94 text-[#2D2825] shadow-[0_14px_38px_rgba(96,63,41,.18)] backdrop-blur md:right-4 md:top-4"
                aria-label="Close recipe profile"
              >
                <IconX className="h-5 w-5" />
              </button>
              <div className="grid lg:grid-cols-[1.04fr_.96fr]">
                <div className="relative min-h-[320px] bg-[#EDE1CF] sm:min-h-[380px] lg:min-h-[620px]">
                  <motion.img
                    layoutId={`recipe-image-${recipe.id}`}
                    src={recipe.image}
                    alt={recipe.title}
                    className="absolute inset-0 h-full w-full object-cover"
                  />
                  <div className="absolute inset-0 bg-[linear-gradient(0deg,rgba(45,40,37,.72),transparent_50%)]" />
                  <div className="absolute bottom-0 left-0 right-0 p-7 md:p-10">
                    <p className="text-xs font-bold uppercase tracking-[0.24em] text-[#F5D8C7]">Recipe Profile</p>
                    <h2 className="mt-3 max-w-xl font-serif text-5xl leading-[.96] text-[#FFF8EB] md:text-7xl">
                      {recipe.title}
                    </h2>
                    <p className="mt-5 max-w-lg text-lg leading-8 text-[#F8EAD6] opacity-90">{recipe.mood}</p>
                  </div>
                </div>

                <div className="paper-panel p-6 md:p-8 lg:p-10">
                  <div className="rounded-[1.5rem] border border-[#E3D1B8] bg-[#FAFAF8]/72 p-5">
                    <p className="text-xs font-bold uppercase tracking-[0.24em] text-[#8A9A86]">The 3 required 50ml pots</p>
                    <div className="mt-4 grid gap-3">
                      {recipe.palette.map((pot) => (
                        <PotTag key={pot.name} pot={pot} />
                      ))}
                    </div>
                    <div className="mt-5 rounded-2xl border border-[#D96C4A]/22 bg-[#D96C4A]/10 p-4 text-sm leading-6 text-[#6E584B]">
                      <strong className="text-[#2D2825]">€29 Base Set:</strong> pick 3 colors, 50ml each.
                    </div>
                  </div>

                  <section className="mt-6 rounded-[1.5rem] border border-[#E3D1B8] bg-[#FDFBF7]/78 p-5">
                    <p className="text-xs font-bold uppercase tracking-[0.24em] text-[#8A9A86]">Layering Recipe</p>
                    <p className="mt-2 text-sm text-[#7A5742]">Clay body: {recipe.clay}</p>
                    <div className="mt-5 space-y-4">
                      {recipe.layers.map(([label, copy]) => (
                        <div key={label} className="grid grid-cols-[72px_1fr] gap-4 border-b border-[#E5D6BE] pb-4 last:border-b-0">
                          <span className="font-serif text-xl font-semibold text-[#D96C4A]">{label}</span>
                          <p className="text-base leading-7 text-[#4C4038]">{copy}</p>
                        </div>
                      ))}
                    </div>
                  </section>

                  <button
                    type="button"
                    onClick={handleAdd}
                    disabled={adding}
                    className="mt-6 inline-flex w-full items-center justify-center gap-3 rounded-2xl bg-[#D96C4A] px-6 py-5 font-bold text-[#FFF8EB] shadow-[0_20px_50px_rgba(217,108,74,.28)] transition hover:-translate-y-0.5 hover:bg-[#C85E3F]"
                  >
                    Add this €29 Set to Waitlist
                    <IconArrow className="h-5 w-5" />
                  </button>
                </div>
              </div>
            </motion.article>
          </motion.div>
        );
      }

      function SwipeDeck() {
        const [cards, setCards] = useState(recipes);
        const [expanded, setExpanded] = useState(null);
        const [toast, setToast] = useState("");
        const [saved, setSaved] = useState([]);
        const [exitDirection, setExitDirection] = useState("right");
        const topCard = cards[0];

        function showToast(message) {
          setToast(message);
          window.clearTimeout(showToast.timer);
          showToast.timer = window.setTimeout(() => setToast(""), 2300);
        }

        function swipe(direction) {
          setExitDirection(direction);

          if (!topCard) {
            setCards(recipes);
            showToast("Fresh ideas on the bench.");
            return;
          }

          if (direction === "right") {
            setSaved((items) => (items.includes(topCard.look) ? items : [...items, topCard.look]));
            setExpanded(topCard);
            showToast("Recipe added to your set!");
          } else {
            setExpanded(null);
          }

          setCards((items) => items.slice(1));
        }

        function addRecipe(recipe) {
          setSaved((items) => (items.includes(recipe.look) ? items : [...items, recipe.look]));
          setExpanded(null);
          showToast("Recipe added to your set!");
        }

        return (
          <section id="swipe-deck" className="studio-section relative overflow-hidden px-5 py-24 text-[#FFF8EB] md:px-8">
            <div className="absolute inset-0 bg-[radial-gradient(circle_at_18%_18%,rgba(217,108,74,.2),transparent_28%),linear-gradient(115deg,rgba(17,13,10,.78),rgba(17,13,10,.48)_48%,rgba(17,13,10,.72))]" />
            <div className="relative mx-auto grid max-w-6xl items-center gap-14 lg:grid-cols-[.88fr_1.12fr]">
              <div>
                <p className="mb-4 text-sm font-bold uppercase tracking-[0.28em] text-[#B88746]">
                  Recipe Swipe Deck
                </p>
                <h2 className="font-serif text-5xl leading-[.98] text-[#FFF8EB] md:text-6xl">
                  Let the fired glaze do the choosing for you.
                </h2>
                <p className="mt-6 max-w-xl text-lg leading-8 text-[#F6ECDE]/82">
                  Swipe right to save a combination and open its recipe profile. Swipe left to reject it and move to the next idea.
                </p>
                <div className="mt-8 rounded-2xl border border-[#F6ECDE]/18 bg-[#1F1813]/62 p-5 text-sm leading-6 text-[#F6ECDE]/80 shadow-[0_24px_70px_rgba(0,0,0,.28)] backdrop-blur">
                  <strong className="block text-[#FFF8EB]">Simple by design:</strong>
                  A €29 Base Set includes 3 colors, 50ml each. Buy what you brush. Stop letting €20 jars dry out on your shelf.
                </div>
                {saved.length > 0 && (
                  <p className="mt-4 max-w-xl text-sm leading-6 text-[#D8E2C8]">
                    Saved recipes: <span className="font-semibold text-[#F0B184]">{saved.join(", ")}</span>
                  </p>
                )}
              </div>

              <div className="mx-auto w-full max-w-[430px]">
                <div className="relative h-[610px]">
                  <AnimatePresence custom={exitDirection}>
                    {cards.slice(0, 3).map((recipe, index) => (
                      <RecipeCard
                        key={recipe.id}
                        recipe={recipe}
                        index={index}
                        active={index === 0}
                        exitDirection={exitDirection}
                        onSwipe={swipe}
                      />
                    ))}
                  </AnimatePresence>

                  {!cards.length && (
                    <div className="absolute inset-0 grid place-items-center rounded-[1.5rem] border border-[#E3D1B8] bg-[#FDFBF7] p-8 text-center card-shadow">
                      <div>
                        <h3 className="font-serif text-4xl text-[#2D2825]">All recipes reviewed.</h3>
                        <p className="mt-3 text-[#665950]">Refresh the stack or jump to the waitlist.</p>
                        <button
                          type="button"
                          onClick={() => setCards(recipes)}
                          className="mt-7 rounded-2xl bg-[#D96C4A] px-6 py-3 font-semibold text-[#FFF8EB] shadow-[0_18px_44px_rgba(217,108,74,.25)]"
                        >
                          Refresh deck
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                <div className="mt-8 flex items-center justify-center gap-5">
                  <button
                    type="button"
                    onClick={() => swipe("left")}
                    className="grid h-16 w-16 place-items-center rounded-full border border-[#E3D1B8] bg-[#FDFBF7] text-[#7A5742] shadow-[0_18px_50px_rgba(96,63,41,.14)] transition hover:-translate-y-1 hover:bg-[#F6ECDE]"
                    aria-label="Skip recipe"
                  >
                    <IconX className="h-7 w-7" />
                  </button>
                  <button
                    type="button"
                    onClick={() => swipe("right")}
                    className="grid h-20 w-20 place-items-center rounded-full bg-[#D96C4A] text-[#FFF8EB] shadow-[0_22px_58px_rgba(217,108,74,.28)] transition hover:-translate-y-1 hover:bg-[#C85E3F]"
                    aria-label="Save recipe"
                  >
                    <IconHeart className="h-8 w-8" />
                  </button>
                </div>
              </div>
            </div>

            <AnimatePresence>
              {expanded && (
                <ExpandedRecipe
                  key={expanded.id}
                  recipe={expanded}
                  onClose={() => setExpanded(null)}
                  onAdd={addRecipe}
                />
              )}
            </AnimatePresence>

            <AnimatePresence>
              {toast && (
                <motion.div
                  initial={{ opacity: 0, y: 18 }}
                  animate={{ opacity: 1, y: 0 }}
                  exit={{ opacity: 0, y: 18 }}
                  className="fixed bottom-6 left-1/2 z-[90] w-[calc(100%-2rem)] max-w-md -translate-x-1/2 rounded-2xl border border-[#E3D1B8] bg-[#FDFBF7]/94 px-5 py-4 text-center font-semibold text-[#2D2825] shadow-[0_22px_70px_rgba(96,63,41,.22)] backdrop-blur"
                >
                  {toast}
                </motion.div>
              )}
            </AnimatePresence>
          </section>
        );
      }

      function BuildYourOwnSet() {
        const [boxContents, setBoxContents] = useState([]);
        const [message, setMessage] = useState("");
        const dragUsed = useRef(false);
        const missingCount = Math.max(0, 3 - boxContents.length);
        const currentPrice = 29 + Math.max(0, boxContents.length - 3) * 5;
        const canSubmit = boxContents.length >= 3;
        const slotCount = Math.max(3, boxContents.length);

        function showMessage(copy) {
          setMessage(copy);
          window.clearTimeout(showMessage.timer);
          showMessage.timer = window.setTimeout(() => setMessage(""), 2200);
        }

        function addColor(glaze) {
          setBoxContents((contents) => [
            ...contents,
            {
              ...glaze,
              instanceId: `${glaze.id}-${Date.now()}-${contents.length}`,
            },
          ]);
          showMessage(`${glaze.name} dropped into your set.`);
        }

        function removeJar(instanceId) {
          setBoxContents((contents) => contents.filter((jar) => jar.instanceId !== instanceId));
        }

        function handleDragEnd(glaze) {
          addColor(glaze);
          window.setTimeout(() => {
            dragUsed.current = false;
          }, 0);
        }

        function handleCustomSubmit() {
          if (!canSubmit) return;
          showMessage(`Custom €${currentPrice} Set added to your waitlist.`);
        }

        return (
          <section id="build-set" className="relative overflow-hidden bg-[#FDFBF7] px-4 py-24 text-[#2D2825] md:px-8">
            <div className="absolute inset-0 bg-[radial-gradient(circle_at_18%_12%,rgba(217,108,74,.1),transparent_28%),radial-gradient(circle_at_84%_68%,rgba(138,154,134,.13),transparent_30%)]" />
            <div className="relative mx-auto min-w-0 max-w-6xl">
              <div className="grid min-w-0 grid-cols-1 gap-8 lg:grid-cols-2 lg:items-start">
                <div className="order-1 max-w-2xl min-w-0 lg:col-start-1 lg:row-start-1">
                  <p className="mb-4 text-sm font-bold uppercase tracking-[0.28em] text-[#B88746]">Build your own set</p>
                  <h2 className="whitespace-normal break-words font-serif text-3xl leading-tight md:text-5xl">Build a set yourself.</h2>
                  <p className="mt-5 max-w-xl text-lg leading-8 text-[#665950]">
                    Start with 3 jars for €29. Every extra 50ml pot adds €5.
                  </p>
                </div>

                <aside className="order-2 min-w-0 rounded-[2rem] border border-[#E3D1B8] bg-[#FAFAF8]/78 p-5 custom-box-shadow md:p-6 lg:col-start-1 lg:row-start-2">
                    <p className="text-sm font-bold uppercase tracking-[0.24em] text-[#B88746]">Custom set</p>
                    <h3 className="mt-3 font-serif text-3xl leading-tight md:text-4xl">€{currentPrice}</h3>
                    <p className="mt-4 leading-7 text-[#665950]">
                      Base Set: 3 jars for €29. Extra jars: €5 each. Remove any jar to update the price.
                    </p>
                    <button
                      type="button"
                      disabled={!canSubmit}
                      onClick={handleCustomSubmit}
                      className={`mt-7 inline-flex w-full items-center justify-center gap-3 rounded-2xl px-5 py-4 text-center font-bold leading-snug transition ${
                        canSubmit
                          ? "bg-[#D96C4A] text-[#FFF8EB] shadow-[0_18px_48px_rgba(217,108,74,.23)] hover:bg-[#C85E3F]"
                          : "cursor-not-allowed bg-[#E3D1B8] text-[#8B786A]"
                      }`}
                    >
                      <span className="min-w-0 whitespace-normal break-words">
                        {canSubmit ? `Add Custom Set to Waitlist (€${currentPrice})` : `Add ${missingCount} more to complete Base Set`}
                      </span>
                      {canSubmit && <IconArrow className="h-5 w-5 shrink-0" />}
                    </button>
                    <AnimatePresence>
                      {message && (
                        <motion.p
                          key={message}
                          initial={{ opacity: 0, y: 8 }}
                          animate={{ opacity: 1, y: 0 }}
                          exit={{ opacity: 0, y: 8 }}
                          className="mt-4 min-h-6 text-sm font-semibold text-[#667760]"
                        >
                          {message}
                        </motion.p>
                      )}
                    </AnimatePresence>
                </aside>

                <div className="order-3 min-w-0 rounded-[1.5rem] border border-[#E3D1B8] bg-[#FAFAF8]/76 p-4 custom-box-shadow md:p-5 lg:col-start-2 lg:row-start-1">
                    <div className="flex min-w-0 flex-wrap items-center justify-between gap-4">
                      <span className="text-sm font-bold uppercase tracking-[0.22em] text-[#8A9A86]">Palette</span>
                      <span className="rounded-full bg-[#D96C4A]/12 px-3 py-1 text-sm font-bold text-[#B85F42]">
                        {boxContents.length} selected
                      </span>
                    </div>
                    <div className="mt-5 flex max-w-full touch-pan-x gap-3 overflow-x-auto overscroll-x-contain pb-2 [-webkit-overflow-scrolling:touch]">
                      {glazeOptions.map((glaze) => (
                        <motion.button
                          key={glaze.id}
                          type="button"
                          layoutId={`palette-${glaze.id}`}
                          drag
                          dragSnapToOrigin
                          dragElastic={0.38}
                          dragConstraints={{ top: 0, right: 0, bottom: 0, left: 0 }}
                          onDragStart={() => {
                            dragUsed.current = true;
                          }}
                          onDragEnd={() => handleDragEnd(glaze)}
                          onClick={() => {
                            if (dragUsed.current) return;
                            addColor(glaze);
                          }}
                          whileTap={{ scale: 0.94 }}
                          className="group min-w-[132px] shrink-0 rounded-2xl border border-[#E3D1B8] bg-[#FDFBF7] p-3 text-left shadow-[0_14px_34px_rgba(96,63,41,.08)] transition hover:-translate-y-0.5"
                        >
                          <span
                            className="block h-14 w-14 rounded-full border border-[#A77B5D]/20 shadow-[inset_0_10px_16px_rgba(255,252,245,.48),inset_0_-10px_18px_rgba(70,45,30,.18)]"
                            style={{ background: glaze.color }}
                          />
                          <span className="mt-3 block text-sm font-bold text-[#2D2825]">{glaze.name}</span>
                          <span className="text-xs font-semibold uppercase tracking-[0.16em] text-[#8A9A86]">{glaze.finish}</span>
                        </motion.button>
                      ))}
                    </div>
                </div>

                <div className="order-4 min-w-0 rounded-[2rem] border border-[#D9C5AA] bg-[#F4E9D8] p-4 custom-box-shadow md:p-7 lg:col-start-2 lg:row-start-2">
                    <div className="min-w-0 rounded-[1.5rem] border border-[#CDB18D] bg-[linear-gradient(135deg,#FDFBF7,#EFE0C8)] p-4 md:p-5">
                      <div className="mb-5 flex min-w-0 flex-wrap items-center justify-between gap-4">
                        <div className="min-w-0">
                          <p className="text-xs font-bold uppercase tracking-[0.24em] text-[#B88746]">Custom Base Set Box</p>
                          <h3 className="mt-1 whitespace-normal break-words font-serif text-2xl leading-tight text-[#2D2825] md:text-3xl">Minimum 3 pots, 50ml each</h3>
                        </div>
                        <span className="rounded-full border border-[#D96C4A]/24 bg-[#D96C4A]/10 px-4 py-2 text-sm font-bold text-[#B85F42]">
                          €{currentPrice}
                        </span>
                      </div>

                      <div className="grid min-w-0 gap-4 sm:grid-cols-2">
                        {Array.from({ length: slotCount }).map((_, slot) => {
                          const jar = boxContents[slot];
                          const isExtra = slot >= 3;

                          return (
                            <motion.div
                              key={slot}
                              layout
                              className="relative min-h-[210px] rounded-[1.35rem] border border-dashed border-[#BFA384] bg-[#FDFBF7]/72 p-4"
                            >
                              <span className="absolute left-4 top-4 text-xs font-bold uppercase tracking-[0.18em] text-[#A28C7D]">
                                {isExtra ? `Extra +€5` : `Base ${slot + 1}`}
                              </span>
                              <div className="grid h-full place-items-center pt-6">
                                <AnimatePresence mode="wait">
                                  {jar ? (
                                    <motion.button
                                      key={jar.instanceId}
                                      type="button"
                                      layout
                                      layoutId={`box-jar-${jar.instanceId}`}
                                      initial={{ opacity: 0, y: -42, scale: 0.72, rotate: -5 }}
                                      animate={{ opacity: 1, y: 0, scale: 1, rotate: 0 }}
                                      exit={{ opacity: 0, y: 24, scale: 0.82 }}
                                      transition={{ type: "spring", stiffness: 380, damping: 28 }}
                                      onClick={() => removeJar(jar.instanceId)}
                                      className="group flex flex-col items-center"
                                      aria-label={`Remove ${jar.name} from custom set`}
                                    >
                                      <span className="relative block h-24 w-20 rounded-[1.35rem_1.35rem_1rem_1rem] border border-[#A77B5D]/22 bg-[#FDFBF7] shadow-[0_18px_34px_rgba(96,63,41,.18)]">
                                        <span className="absolute left-1/2 top-[-10px] h-4 w-12 -translate-x-1/2 rounded-full border border-[#A77B5D]/18 bg-[#F9F0E2]" />
                                        <span
                                          className="absolute inset-x-3 bottom-3 top-5 rounded-[1rem] shadow-[inset_0_10px_18px_rgba(255,255,255,.22),inset_0_-10px_18px_rgba(46,32,22,.18)]"
                                          style={{ background: jar.color }}
                                        />
                                        <span className="absolute -right-2 -top-2 grid h-7 w-7 place-items-center rounded-full bg-[#D96C4A] text-[#FFF8EB] opacity-0 transition group-hover:opacity-100">
                                          <IconX className="h-4 w-4" />
                                        </span>
                                      </span>
                                      <span className="mt-3 text-sm font-bold text-[#2D2825]">{jar.name}</span>
                                      <span className="text-xs font-semibold uppercase tracking-[0.16em] text-[#8A9A86]">Remove</span>
                                    </motion.button>
                                  ) : (
                                    <motion.div
                                      key="empty"
                                      initial={{ opacity: 0 }}
                                      animate={{ opacity: 1 }}
                                      exit={{ opacity: 0 }}
                                      className="text-center text-sm font-semibold text-[#A28C7D]"
                                    >
                                      Empty 50ml pot
                                    </motion.div>
                                  )}
                                </AnimatePresence>
                              </div>
                            </motion.div>
                          );
                        })}
                      </div>
                    </div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      function GlazeRecipesLanding() {
        const [email, setEmail] = useState("");
        const [submitted, setSubmitted] = useState(false);

        useEffect(() => {
          if (!window.location.hash) return;
          window.requestAnimationFrame(() => {
            document.querySelector(window.location.hash)?.scrollIntoView();
          });
        }, []);

        function handleSubmit(event) {
          event.preventDefault();
          if (!email.trim()) return;
          localStorage.setItem("glazerecipes_waitlist_email", email.trim());
          setSubmitted(true);
          setEmail("");
        }

        return (
          <main className="min-h-screen overflow-x-hidden bg-[#FDFBF7] text-[#2D2825]">
            <section className="relative isolate min-h-screen overflow-hidden bg-[#FDFBF7] px-5 py-8 text-[#2D2825] md:px-8 md:py-10">
              <HeroSlideshow />
              <nav className="relative z-10 mx-auto flex max-w-6xl items-center justify-between">
                <a href="#" className="font-serif text-2xl font-semibold tracking-tight text-[#2D2825]">
                  Glaze<span className="text-[#D96C4A]">Recipes</span>
                </a>
                <a
                  href="#waitlist"
                  className="hidden rounded-full border border-[#E3D1B8] bg-[#FDFBF7]/72 px-5 py-2.5 text-sm font-semibold text-[#2D2825] shadow-[0_12px_30px_rgba(96,63,41,.08)] backdrop-blur transition hover:bg-[#F7EFE3] sm:inline-flex"
                >
                  Waitlist
                </a>
              </nav>

              <div className="relative z-10 mx-auto flex min-h-[calc(100vh-92px)] max-w-6xl items-center pb-16 pt-14">
                <div className="max-w-3xl">
                  <p className="inline-flex rounded-full border border-[#E3D1B8] bg-[#FDFBF7]/72 px-4 py-2 text-sm font-semibold text-[#7A5742] shadow-[0_12px_30px_rgba(96,63,41,.08)] backdrop-blur">
                    €29 Base Set
                  </p>
                  <h1 className="mt-5 max-w-[8ch] font-serif text-6xl leading-[.88] text-[#2D2825] sm:text-7xl md:text-8xl">
                    Glaze Recipes
                  </h1>
                  <div className="mt-6 flex max-w-[410px] flex-wrap gap-2">
                    {["3 colors", "50ml pots", "Exact recipe", "Secure packaging"].map((term) => (
                      <span key={term} className="rounded-full border border-[#E3D1B8] bg-[#FDFBF7]/72 px-3.5 py-2 text-sm font-semibold text-[#5D4E45] shadow-[0_10px_24px_rgba(96,63,41,.06)] backdrop-blur">
                        {term}
                      </span>
                    ))}
                  </div>
                  <div className="mt-8 flex w-full max-w-[260px]">
                    <a
                      href="#swipe-deck"
                      className="inline-flex w-full items-center justify-center gap-3 rounded-2xl bg-[#D96C4A] px-6 py-4 font-bold text-[#FFF8EB] shadow-[0_22px_58px_rgba(217,108,74,.26)] transition hover:-translate-y-1 hover:bg-[#C85E3F]"
                    >
                      Start swiping <IconArrow className="h-5 w-5" />
                    </a>
                  </div>
                </div>
              </div>
            </section>

            <section id="how-it-works" className="relative overflow-hidden bg-[#F6ECDE] px-5 py-24 text-[#2D2825] md:px-8">
              <div className="absolute inset-0 bg-[radial-gradient(circle_at_18%_18%,rgba(217,108,74,.08),transparent_28%),radial-gradient(circle_at_84%_70%,rgba(138,154,134,.1),transparent_32%)]" />
              <div className="relative mx-auto max-w-6xl">
                <p className="mb-4 text-sm font-bold uppercase tracking-[0.28em] text-[#B88746]">How it works</p>
                <h2 className="max-w-3xl whitespace-normal break-words font-serif text-4xl leading-tight text-[#2D2825] md:text-6xl">
                  From palette to kiln shelf in three simple steps.
                </h2>
                <div className="mt-12 grid gap-5 md:grid-cols-3">
                  {[
                    ["01", "Build your palette.", "Swipe the deck, open recipe profiles, and pick your €29 Base Set of 3 colors."],
                    ["02", "Receive studio-ready pots.", "Secure, studio-ready packaging keeps every 50ml pot sealed and bench-ready."],
                    ["03", "Fire with exact recipes.", "Layering order, firing notes, and test tile prompts come with each set."],
                  ].map(([number, title, copy]) => (
                    <article key={number} className="rounded-[1.5rem] border border-[#E3D1B8] bg-[#FDFBF7]/74 p-7 warm-shadow">
                      <div className="mb-10 flex h-11 w-11 items-center justify-center rounded-full bg-[#D96C4A]/13 text-sm font-bold text-[#D96C4A]">{number}</div>
                      <h3 className="font-serif text-3xl leading-tight text-[#2D2825]">{title}</h3>
                      <p className="mt-4 leading-7 text-[#665950]">{copy}</p>
                    </article>
                  ))}
                </div>
              </div>
            </section>

            <SwipeDeck />

            <BuildYourOwnSet />

            <section id="waitlist" className="workbench-section relative overflow-hidden px-5 py-24 text-[#FFF8EB] md:px-8">
              <div className="absolute inset-0 bg-black/50" />
              <div className="relative mx-auto grid min-w-0 max-w-5xl items-center gap-10 rounded-[2rem] border border-[#FFF8EB]/16 bg-[#1F1813]/68 p-6 shadow-[0_30px_90px_rgba(0,0,0,.28)] backdrop-blur md:grid-cols-[minmax(0,1fr)_420px] md:p-10">
                <div className="absolute hidden" aria-hidden="true" />
                <div className="border-l-4 border-[#D96C4A] pl-6">
                  <p className="mb-4 flex items-center gap-2 text-sm font-bold uppercase tracking-[0.28em] text-[#F0B184]">
                    <IconSpark className="h-4 w-4" /> Early access
                  </p>
                  <h2 className="whitespace-normal break-words font-serif text-4xl leading-tight text-[#FFF8EB] md:text-5xl">Ready to glaze smarter?</h2>
                  <p className="mt-5 text-lg leading-8 text-[#F6ECDE]/84">
                    Join the waitlist. Early members get priority access and a free 4th color in their first €29 Base Set.
                  </p>
                </div>
                <form onSubmit={handleSubmit} className="min-w-0 space-y-3">
                  <input
                    type="email"
                    required
                    value={email}
                    onChange={(event) => setEmail(event.target.value)}
                    placeholder="your@email.com"
                    className="soft-input h-14 w-full rounded-2xl border border-[#E3D1B8] bg-[#FDFBF7] px-5 text-[#2D2825] outline-none placeholder:text-[#A28C7D] focus:border-[#D96C4A]"
                  />
                  <button
                    type="submit"
                    className="inline-flex h-14 w-full items-center justify-center gap-3 rounded-2xl bg-[#D96C4A] font-bold text-[#FFF8EB] shadow-[0_18px_48px_rgba(217,108,74,.23)] transition hover:bg-[#C85E3F]"
                  >
                    Join waitlist <IconArrow className="h-5 w-5" />
                  </button>
                  <p className="min-h-6 text-center text-sm font-semibold text-[#D8E2C8]">
                    {submitted ? "You're on the waitlist. Your free 4th color is reserved." : ""}
                  </p>
                </form>
              </div>
            </section>
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<GlazeRecipesLanding />);
    </script>
  </body>
</html>
